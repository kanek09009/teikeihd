<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提携事務所HD - Premium Edition</title>
    <style>
        :root {
            --bg-main: #313338;
            --bg-secondary: #2b2d31;
            --bg-tertiary: #1e1f22;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --accent-color: #5865f2; 
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-normal);
            overflow-x: hidden;
            position: relative;
        }

        /* ロゴセクション */
        .main-visual {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #232529 0%, #1e1f22 100%);
        }

        .logo-mask {
            display: inline-block;
            height: 320px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            overflow: hidden;
            background-color: #000;
        }

        .main-logo { width: 100%; height: 100%; object-fit: contain; }

        /* ヘッダー */
        header { background-color: var(--bg-secondary); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .header-inner { display: flex; justify-content: center; align-items: center; height: 70px; }
        .nav-links { display: flex; list-style: none; gap: 40px; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: bold; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--white); }

        /* キャッチコピー */
        .hero-banner { text-align: center; padding: 60px 0; }
        .hero-banner h1 { color: var(--white); font-size: 3rem; margin-bottom: 40px; }
        
        .catchphrase-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .catch-line {
            display: block; font-size: 4.5rem; font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.5));
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText { to { background-position: 200% center; } }

        .slide-left { animation: bounceInLeft 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        .slide-right { animation: bounceInRight 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }

        @keyframes bounceInLeft { 0% { transform: translateX(-200%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes bounceInRight { 0% { transform: translateX(200%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

        /* ギミックボタン */
        .gimmick-section { padding: 80px 0; text-align: center; }
        .bored-btn {
            padding: 25px 60px; background: var(--accent-color); color: white;
            border: none; border-radius: 15px; font-size: 1.8rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 0 #3e48cc; transition: 0.1s;
        }
        .bored-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #3e48cc; }

        /* キャラクター移動アニメーション */
        .herta-char {
            position: fixed;
            bottom: 5%;
            right: -300px;
            width: 250px;
            z-index: 9999;
            pointer-events: none;
            animation: hertaMove 1.8s linear forwards;
        }

        @keyframes hertaMove {
            0% { right: -300px; transform: rotate(0deg); }
            100% { right: 100%; transform: rotate(-720deg); }
        }

        footer { background: var(--bg-tertiary); padding: 40px 0; text-align: center; color: var(--text-muted); }

        @media screen and (max-width: 768px) { .catch-line { font-size: 2.2rem; } }
    </style>
</head>
<body>

    <div class="main-visual">
        <div class="logo-mask">
            <img src="https://i.gyazo.com/0b047df81389714e6b5cef23231b7fcc.png" alt="ロゴ" class="main-logo">
        </div>
    </div>

    <header>
        <div class="header-inner">
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">ホーム</a></li>
                    <li><a href="gaiyou.html">事務所概要</a></li>
                    <li><a href="jiji.html">時事・予定</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="hero-banner">
            <h1>提携事務所HD</h1>
            <div class="catchphrase-container">
                <span class="catch-line slide-left">先に築こう。</span>
                <span class="catch-line slide-right">時代の最先端。</span>
            </div>
        </div>

        <section class="gimmick-section">
            <button class="bored-btn" id="hertaBtn">Anyone wants a prise</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Written by かねく</p>
    </footer>

    <script>
        const hertaBtn = document.getElementById('hertaBtn');
        const characterImg = "https://i.gyazo.com/06d4fae8844fafb7b8b0b21057ff7be4.png";
        
        // 音声ファイルの準備 (GitHub上の公開ソースを利用)
        const audioPaths = [
            "https://raw.githubusercontent.com/Duiqt/herta_kuru/main/public/audio/kuruto.mp3",
            "https://raw.githubusercontent.com/Duiqt/herta_kuru/main/public/audio/kuru1.mp3"
        ];

        hertaBtn.addEventListener('click', () => {
            // 1. キャラクターを生成
            const char = document.createElement('img');
            char.src = characterImg;
            char.className = 'herta-char';
            char.style.bottom = (Math.random() * 30 + 5) + '%';
            document.body.appendChild(char);

            // 2. 音声をランダムに再生
            const randomAudio = new Audio(audioPaths[Math.floor(Math.random() * audioPaths.length)]);
            randomAudio.play();
          const audioPaths = [
    se/01.mp3
];

            // 3. アニメーション終了後に削除
            char.addEventListener('animationend', () => char.remove());
        });
    </script>
</body>
</html>
